name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
      - name: Установить зависимости
        run: npm ci
      - name: Проверить исходники и собрать dist
        run: |
          npm run check
          cmp -s www/index.html dist/index.html
          test -f dist/capacitor.js
          test -f dist/build-manifest.json
          git diff --exit-code -- www package.json package-lock.json capacitor.config.json
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@f829d8c66a91176eb6a4b321b4b3ea5ab10c6ab
