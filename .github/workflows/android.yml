name: APK

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Capacitor 6 требует JDK 17
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Зависимости
        run: npm ci

      # Android впрыскивает только native-bridge.js. registerPlugin живёт
      # в пакете @capacitor/core — без него плагины не поднимутся вообще.
      - name: Рантайм Capacitor в www/
        run: node scripts/copy-runtime.mjs

      - name: Локальная модель YAMNet (с проверкой SHA-256)
        run: node scripts/fetch-yamnet.mjs

      # android/ не в репозитории — генерируем на каждой сборке
      - name: Создать проект Android
        run: npx cap add android

      - name: Иконки и сплэш из assets/
        run: npx @capacitor/assets generate --android

      - name: Накатить натив (плагин + разрешения)
        run: node scripts/patch-android.mjs

      - name: Синхронизировать
        run: npx cap sync android

      - name: Собрать APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: n54-deck-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
